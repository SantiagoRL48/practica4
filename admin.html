<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - MiCamisa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">
      <i class="fa fa-store me-1"></i>MiCamisa
      <span class="badge bg-warning text-dark ms-2 fs-6">Admin</span>
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">
          <i class="fa fa-arrow-left me-1"></i>Volver a la tienda
        </a></li>
      </ul>
    </div>
  </div>
</nav>


<div class="container mt-5 mb-5">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2><i class="fa fa-cogs me-2 text-warning"></i>Panel de Administración</h2>
    <button class="btn btn-success" onclick="openCreateModal()">
      <i class="fa fa-plus me-1"></i>Nuevo producto
    </button>
  </div>

  <!-- Tabla de productos -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th>Imagen</th>
              <th>Título</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr>
              <td colspan="6" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>


<!-- ── MODAL: Crear / Editar producto ───────────────────────────────────── -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="productModalTitle">Nuevo producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger d-none" id="formError"></div>
        <form id="productForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-bold">URL de imagen <span class="text-danger">*</span></label>
            <input type="url" id="fImageUrl" class="form-control" placeholder="https://..." required>
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Título <span class="text-danger">*</span></label>
              <input type="text" id="fTitle" class="form-control" placeholder="Nombre del producto" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Categoría <span class="text-danger">*</span></label>
              <input type="text" id="fCategory" class="form-control" placeholder="frutas, lacteos..." required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Descripción <span class="text-danger">*</span></label>
            <textarea id="fDescription" class="form-control" rows="2" placeholder="Descripción del producto" required></textarea>
          </div>
          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label fw-bold">Unidad <span class="text-danger">*</span></label>
              <input type="text" id="fUnit" class="form-control" placeholder="kg, pieza, litro..." required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Precio por unidad <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" id="fPrice" class="form-control" placeholder="0.00" min="0" step="0.01" required>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Stock <span class="text-danger">*</span></label>
              <input type="number" id="fStock" class="form-control" placeholder="0" min="0" required>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" form="productForm" class="btn btn-primary" id="formSubmitBtn">
          Crear producto
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ── MODAL: Confirmar eliminación ─────────────────────────────────────── -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-danger">
          <i class="fa fa-exclamation-triangle me-2"></i>Eliminar producto
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        ¿Seguro que deseas eliminar <strong id="deleteProductName"></strong>?
        Esta acción no se puede deshacer.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
          <i class="fa fa-trash me-1"></i>Eliminar
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ── TOAST: Confirmación ───────────────────────────────────────────────── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="adminToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body fw-bold" id="adminToastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
