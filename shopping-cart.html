<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Compras - MiCamisa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-light shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">
      <i class="fa fa-store text-primary me-1"></i>MiCamisa
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="orders.html">Pedidos</a></li>
      </ul>
      <form class="d-flex me-3" onsubmit="return false;">
        <input class="form-control me-2" type="search" placeholder="Buscar...">
        <button class="btn btn-outline-success" type="button">Buscar</button>
      </form>
      <!-- Carrito activo -->
      <a class="btn btn-primary position-relative me-2" href="shopping-cart.html">
        <i class="fa fa-shopping-cart"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge">0</span>
      </a>
    </div>
  </div>
</nav>


<div class="container mt-5 mb-5">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <h2><i class="fa fa-shopping-cart me-2 text-primary"></i>Resumen de compra</h2>
    <a href="index.html" class="btn btn-outline-secondary btn-sm">
      <i class="fa fa-arrow-left me-1"></i>Seguir comprando
    </a>
  </div>

  <div class="row g-4">
    <!-- Lista de items (col izquierda) -->
    <div class="col-12 col-lg-8">
      <div id="cartItems">
        <!-- Llenado por shopping-cart.js -->
      </div>
    </div>

    <!-- Resumen / total (col derecha) -->
    <div class="col-12 col-lg-4">
      <div id="cartSummary">
        <!-- Llenado por shopping-cart.js -->
      </div>
    </div>
  </div>
</div>


<!-- ── MODAL: Confirmar eliminación ─────────────────────────────────────── -->
<div class="modal fade" id="removeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-danger">
          <i class="fa fa-trash me-2"></i>Eliminar producto
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        ¿Estás seguro de que quieres eliminar <strong id="removeProductName"></strong> del carrito?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmRemoveBtn">
          <i class="fa fa-trash me-1"></i>Eliminar
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ── MODAL: Pago exitoso ───────────────────────────────────────────────── -->
<div class="modal fade" id="checkoutModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-5">
        <i class="fa fa-check-circle text-success fa-5x mb-3"></i>
        <h4 class="mb-2">¡Pago realizado con éxito!</h4>
        <p class="text-muted">Tu pedido ha sido procesado. Pronto recibirás tu confirmación.</p>
        <a href="index.html" class="btn btn-primary mt-2">
          <i class="fa fa-home me-1"></i>Volver al inicio
        </a>
      </div>
    </div>
  </div>
</div>


<footer>
  <div class="container-fluid bg-primary text-white text-center py-2">
    MiCamisa - ¡Compra yaa! 🛒
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script src="js/shopping-cart.js"></script>

</body>
</html>
